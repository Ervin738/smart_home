<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB9E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#bgGradient)"/>
  
  <!-- Alarm clock body -->
  <g filter="url(#shadow)">
    <!-- Clock face -->
    <circle cx="50" cy="52" r="22" fill="#FF5252"/>
    <circle cx="50" cy="52" r="18" fill="#FFE5E5"/>
    
    <!-- Clock hands -->
    <line x1="50" y1="52" x2="50" y2="40" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="52" x2="56" y2="52" stroke="#FF5252" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Center dot -->
    <circle cx="50" cy="52" r="2" fill="#333"/>
    
    <!-- Alarm bells -->
    <circle cx="35" cy="35" r="6" fill="#FDB45C"/>
    <circle cx="65" cy="35" r="6" fill="#FDB45C"/>
    
    <!-- Bell details -->
    <path d="M 32 35 Q 35 32 38 35" stroke="#E89C3C" stroke-width="1.5" fill="none"/>
    <path d="M 62 35 Q 65 32 68 35" stroke="#E89C3C" stroke-width="1.5" fill="none"/>
    
    <!-- Stand -->
    <ellipse cx="50" cy="74" rx="12" ry="3" fill="#C4B5FD" opacity="0.6"/>
  </g>
</svg>
